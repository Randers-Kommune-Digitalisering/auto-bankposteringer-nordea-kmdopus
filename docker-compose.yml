services:
  app:
    build:
      context: .
      target: dev
    container_name: nuxt_app
    ports:
      - "3000:3000"
    entrypoint: ["sh", "./docker-entrypoint.sh"]
    command: ["pnpm", "dev"]
    volumes:
      - .:/app:cached
    env_file:
      - .env
    environment:
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit_dev
    ports:
      # Web UI
      - "8025:8025"
      # SMTP
      - "1025:1025"

  db:
    image: postgres
    container_name: postgres_dev
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  sftp:
    image: atmoz/sftp:alpine
    container_name: sftp_dev
    ports:
      - "2223:22"
    # Creates user "test" with password "pass" and two directories inside the chroot:
    #   /test-from-randers
    #   /test-to-randers
    command: "test:pass:1001:100:test-from-randers,test-to-randers"

volumes:
  postgres_data: