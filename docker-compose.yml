services:
  app:
    build:
      context: .
      target: dev
    container_name: nuxt_app
    ports:
      - "3000:3000"
    entrypoint: ["sh", "./docker-entrypoint.sh"]
    command: ["pnpm", "dev"]
    volumes:
      - .:/app:cached
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_RESET_ON_START: "1"
      DB_MIGRATE_ON_START: "1"
      SEED_DEV_DATA: "1"
    depends_on:
      - db

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit_dev
    ports:
      # Web UI
      - "8025:8025"
      # SMTP
      - "1025:1025"

  db:
    image: postgres
    container_name: postgres_dev
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: