services:
  app:
    build:
      context: .
      target: dev
    container_name: nuxt_app
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    entrypoint: ["sh", "./docker-entrypoint.sh"]
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    volumes:
      - .:/app:cached
    env_file:
      - .env
    environment:
      NODE_ENV: development
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      CODESPACE_NAME: ${CODESPACE_NAME:-}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres
    container_name: postgres_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak_dev
    profiles: ["keycloak"]
    command: ["start-dev", "--http-port=8080"]
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - keycloak_data:/opt/keycloak/data

  sftp:
    image: atmoz/sftp:alpine
    container_name: sftp_dev
    ports:
      - "2223:22"
    # Creates user "test" with password "pass" and two directories inside the chroot:
    #   /test-from-randers
    #   /test-to-randers
    command: "test:pass:1001:100:test-from-randers,test-to-randers"

volumes:
  postgres_data:
  keycloak_data: